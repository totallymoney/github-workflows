name: Pull Request

on:
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    uses: totallymoney/github-workflows/.github/workflows/node-cdk.pull-request.yml@v1
    with:
      node-version: ${{ vars.NODE_VERSION }}
      aws-region: ${{ vars.AWS_REGION }}
      oidc-role-arn: ${{ vars.OIDC_ROLE_ARN }}
      cdk-stack-name: ${{ vars.CDK_STACK_NAME }}
