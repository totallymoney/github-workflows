name: Create Release

inputs:
  version-prefix:
    description: "Version prefix (e.g. '0.2' produces '0.2.{run_number}')"
    required: true

outputs:
  version:
    description: "The release version"
    value: ${{ steps.setup.outputs.version }}

runs:
  using: composite

  steps:
    - name: Setup job variables
      id: setup
      env:
        VERSION_PREFIX: ${{ inputs.version-prefix }}
      shell: bash
      run: echo "version=${VERSION_PREFIX}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Create GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
      shell: bash
      run: gh release create "${{ steps.setup.outputs.version }}" --generate-notes
