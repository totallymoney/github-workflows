name: Check Formatting

inputs:
  node-version:
    description: "Node version needed (e.g. 24)"
    required: true

runs:
  using: composite

  steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Restore NPM packages
      shell: bash
      run: npm ci

    - name: Check formatting
      shell: bash
      run: npm run format:check
