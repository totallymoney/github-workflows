name: Scheduled E2E Tests

on:
  workflow_call:
    inputs:
      aws-region:
        description: "AWS region to deploy to"
        type: string
        required: true
      oidc-role-arn:
        description: "OIDC role to assume"
        type: string
        required: true
      api-collection-dir:
        description: "Directory containing API collection files"
        type: string
        default: "API Collection"
      prod-tag:
        description: "Bruno tag used to filter tests when running against prod"
        type: string
        default: "prod-safe"

permissions:
  contents: read
  id-token: write

jobs:
  e2e_tests_stage:
    name: Run E2E Tests on Stage Environment
    runs-on: ubuntu-latest
    steps:
      - uses: totallymoney/github-workflows/.github/actions/bruno/run-e2e-tests@v1
        with:
          aws-region: ${{ inputs.aws-region }}
          oidc-role-arn: ${{ inputs.oidc-role-arn }}
          environment: stage
          api-collection-dir: ${{ inputs.api-collection-dir }}

  e2e_tests_prod:
    name: Run E2E Tests on Prod Environment
    runs-on: ubuntu-latest
    steps:
      - uses: totallymoney/github-workflows/.github/actions/bruno/run-e2e-tests@v1
        with:
          aws-region: ${{ inputs.aws-region }}
          oidc-role-arn: ${{ inputs.oidc-role-arn }}
          environment: prod
          api-collection-dir: ${{ inputs.api-collection-dir }}
          prod-tag: ${{ inputs.prod-tag }}
