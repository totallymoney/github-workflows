name: Job - Create Release

on:
  workflow_call:
    inputs:
      version-prefix:
        description: "Version prefix (e.g. '0.2' produces '0.2.{run_number}')"
        type: string
        required: true
    outputs:
      version:
        description: "The release version"
        value: ${{ jobs.run.outputs.version }}

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      version: ${{ steps.setup.outputs.version }}

    steps:
      - name: Setup job variables
        id: setup
        run: echo "version=${{ inputs.version-prefix }}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.setup.outputs.version }}" --generate-notes
