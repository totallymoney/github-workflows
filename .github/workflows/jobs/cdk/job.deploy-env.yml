name: Job - Deploy Environment

on:
  workflow_call:
    inputs:
      aws-region:
        description: "AWS region to deploy to"
        type: string
        required: true
      oidc-role:
        description: "OIDC role to assume"
        type: string
        required: true
      environment:
        description: "Environment to deploy (e.g. stage, prod)"
        type: string
        required: true
      node-version:
        description: "Node version to use"
        type: string
        required: true
      release-version:
        description: "Release version (e.g. 0.1.42 — from the GitHub Release tag). Only needed if deploying from a release."
        type: string
      cdk-dir:
        description: "Directory containing CDK app"
        type: string
        default: "app-stack"
      cdk-stack-name:
        description: "Base name of the CDK stack (environment will be appended, e.g. 'my-app' → 'my-app-stage')"
        type: string
        required: true

env:
  VERSION: ${{ inputs.release-version || '0.0.0' }}
  REF: ${{ inputs.release-version || github.ref }}

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.REF }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ${{ inputs.cdk-dir }}/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.2
        with:
          role-to-assume: ${{ inputs.oidc-role }}
          aws-region: ${{ inputs.aws-region }}

      - name: Install root dependencies
        run: npm ci

      - name: Install CDK dependencies
        working-directory: ${{ inputs.cdk-dir }}
        run: npm ci

      - name: Deploy CDK stack
        working-directory: ${{ inputs.cdk-dir }}
        env:
          VERSION: ${{ env.VERSION }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: npx cdk deploy ${{ inputs.cdk-stack-name }}-${{ inputs.environment }} --require-approval never
