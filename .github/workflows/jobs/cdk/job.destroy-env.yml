name: Job - Destroy Environment

on:
  workflow_call:
    inputs:
      aws-region:
        description: "AWS region to deploy to"
        type: string
        required: true
      oidc-role:
        description: "OIDC role to assume"
        type: string
        required: true
      environment:
        description: "Environment to destroy (e.g. pr-0)"
        type: string
        required: true
      node-version:
        description: "Node version to use"
        type: string
        required: true
      cdk-dir:
        description: "Directory containing CDK app"
        type: string
        default: "app-stack"
      cdk-stack-name:
        description: "Base name of the CDK stack (environment will be appended, e.g. 'my-app' → 'my-app-pr-123')"
        type: string
        required: true

jobs:
  run:
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ${{ inputs.cdk-dir }}/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.2
        with:
          role-to-assume: ${{ inputs.oidc-role }}
          aws-region: ${{ inputs.aws-region }}

      - name: Install root dependencies
        run: npm ci

      - name: Install CDK dependencies
        working-directory: ${{ inputs.cdk-dir }}
        run: npm ci

      - name: Destroy CDK stack
        working-directory: ${{ inputs.cdk-dir }}
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if aws cloudformation describe-stacks --stack-name "${{ inputs.cdk-stack-name }}-${{ inputs.environment }}" 2>&1 | grep -q "does not exist"; then
            echo "Stack does not exist, skipping destroy"
          else
            npx cdk destroy "${{ inputs.cdk-stack-name }}-${{ inputs.environment }}" --force
          fi
