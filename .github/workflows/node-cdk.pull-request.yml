name: Pull Request

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node version to use (e.g. 24)"
        type: string
        required: true
      aws-region:
        description: "AWS region to deploy to"
        type: string
        required: true
      oidc-role-arn:
        description: "OIDC role to assume"
        type: string
        required: true
      cdk-stack-name:
        description: "Base name of the CDK stack"
        type: string
        required: true
      cdk-dir:
        description: "Directory containing CDK app"
        type: string
        default: "app-stack"
      api-collection-dir:
        description: "Directory containing API collection files"
        type: string
        default: "API Collection"

permissions:
  contents: read
  id-token: write

jobs:
  format_check:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/node/check-formatting
        with:
          node-version: ${{ inputs.node-version }}

  unit_tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/node/run-unit-tests
        with:
          node-version: ${{ inputs.node-version }}

  integration_tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/node/run-integration-tests
        with:
          node-version: ${{ inputs.node-version }}

  deploy:
    name: Deploy to Feature Environment
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - uses: ./.github/actions/cdk/deploy-env
        with:
          aws-region: ${{ inputs.aws-region }}
          oidc-role-arn: ${{ inputs.oidc-role-arn }}
          environment: pr-${{ github.event.pull_request.number }}
          node-version: ${{ inputs.node-version }}
          cdk-stack-name: ${{ inputs.cdk-stack-name }}
          cdk-dir: ${{ inputs.cdk-dir }}

  e2e_tests:
    name: Run E2E Tests on Feature Environment
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/bruno/run-e2e-tests
        with:
          aws-region: ${{ inputs.aws-region }}
          oidc-role-arn: ${{ inputs.oidc-role-arn }}
          environment: pr-${{ github.event.pull_request.number }}
          api-collection-dir: ${{ inputs.api-collection-dir }}
